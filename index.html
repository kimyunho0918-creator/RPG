<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonsterRift</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>MonsterRift</h1>
        <p class="subtitle">Static GitHub Pages edition · save data stays in your browser</p>
      </div>
      <div class="meta" id="runMeta">Choose starters and begin a run.</div>
    </header>

    <main class="layout">
      <section class="panel" id="leftPanel">
        <h2>Starter Draft</h2>
        <p class="hint">Pick up to 10 total points.</p>
        <div id="starterBudget" class="budget">Budget: 0 / 10</div>
        <div id="starterList" class="grid"></div>
        <div class="stack-buttons">
          <button id="startRunBtn" class="primary">Start Run</button>
          <button id="resetSaveBtn" class="danger">Reset Save</button>
        </div>
      </section>

      <section class="panel battle-panel">
        <div id="battleScreen" class="battle-screen empty">No run active.</div>
        <div id="rewardPanel" class="reward-panel hidden"></div>
        <div id="actions" class="actions hidden">
          <button data-action="attack">Attack</button>
          <button data-action="skill">Skill</button>
          <button data-action="guard">Guard</button>
          <button id="swapBtn">Swap</button>
        </div>
        <div id="swapPanel" class="swap-panel hidden"></div>
      </section>

      <section class="panel">
        <h2>Battle Log</h2>
        <div class="save-note">Auto-saves in localStorage</div>
        <div id="log" class="log"></div>
      </section>
    </main>
  </div>

  <script src="./game-core.js"></script>
  <script src="./app.js"></script>
</body>
</html>
